body:
  text: 世緯儒家類提要臣等謹案世緯二卷明袁袠撰袠字永之號胥臺吳縣人嘉靖丙戌進士官至廣西提學僉事是書凡二十篇曰官宗曰遴傅曰簡輔曰降交曰誘諫曰廣薦曰崇儒曰貴士曰裁閹曰汰異曰距僞曰抑躁曰久任曰惜爵曰懲墨曰節浮曰革奢曰正典曰實塞曰均賦其言皆指陳無隱切中時弊雖立說不免過激而憂時感事發憤著書亦賈誼痛哭之流亞也當時狃于晏安文恬武嬉朝廷方以無事為福故袠自序有鑿枘異用竽瑟殊好空言無益只增多口之語而距僞一篇講學者尤深嫉之然袠之言曰今之僞者其所誦讀者周孔之詩書也其所講習者程朱之𫝊疏也而其所談者則佛老之糟粕也黨同而伐異尊陸而毁朱云云蓋指姚江末流之極弊有激言之實非排斥正學也乾隆四十六年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀世緯原序昔孔子謂我欲載之空言不如見諸行事之深切著明也悲夫古之人茍懷抱材德者曷嘗不欲匡依明聖興立事業者哉而卒託之空言命也是以君子進則勒洪伐於鐘彞退則修遺文於方冊身雖不得躬行其道文之所垂亦足以自見而為法於將來周秦而下善言治理者莫如賈誼其次則王通陸贄又其次則蘇軾王通太平十二䇿亡逸莫考我欲觀唐宋之事舍陸蘇何適矣夫欲考往而知來者惡可無空言哉是世緯之所由作也客曰古之立辭者不得志則為之故屈平放而賦騷虞卿窮而著書今聖人在位材傑進趨言行計從世緯之作何也袁子曰否非是之謂也夫髙居而逖聽者天子之職也叙官而詔祿者大臣之業也程功而纍勞者百司之分也博稽而廣議者衆士之慮也古者庶人工商有謗有諫而况於士乎袠也嘗從大夫之後矣官守有恆言責無與未嘗得排閶闔之門趨文石之陛一攄其愚徒以强壯之年嬰狗馬之疾一旦恐溘先朝露非託筆劄何以自見世緯凡二十篇語多刺譏且濶於事情亦知其枘鑿異用竽瑟殊好空言無益秪增多口有志於應世者亦矜其狂愚采其可用者云爾吳縣袁袠序
